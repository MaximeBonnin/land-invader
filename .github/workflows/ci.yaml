name: CI
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check-odin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # required to pull GitHub releases
          release: latest                       # or: nightly
      - run: odin check game -vet -strict-style -collection:http=game/libs/odin-http

  check-odin:
    runs-on: ubuntu-latest
    steps:
          runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
      - run: go vet ./...
      - run: go test ./...